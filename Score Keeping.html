<!DOCTYPE html>
<html>
<title> Score Keeping Page</title>
<head>

<style>
table, th, td {
  border: 1px solid rgb(255, 255, 255);
}
</style>
</head>
<link rel="stylesheet" href="scorestyle.css">
<body>

<h2>Score Keeping Table</h2>


<table style="width:100%">
  <tr>
    <th>Home</th>
    <th>Guest</th> 
  <tr>
    <td><button onclick="changeScore('home', -1)">Lost one point</button></td>
    <td><button onclick="changeScore('guest', -1)">Lost one point</button></td>
    <input type="button" onclick="clearScores()" value="Set completed">
  </tr>
  <tr>
    <td><button onclick="changeScore('home', 1)">Won one point</button></td>
    <td><button onclick="changeScore('guest', 1)">Won one point</button></td>
  </tr>
  <tr>
    <td id="homeScore">0</td>
    <td id="guestScore">0</td>
  </tr>
</table>

<script>
  let homeScore = 0;
  let guestScore = 0;
  
  function changeScore(team, points) {
    if (team === 'home') {
      homeScore += points;
      document.getElementById('homeScore').textContent = homeScore;
    } else if (team === 'guest') {
      guestScore += points;
      document.getElementById('guestScore').textContent = guestScore;
    }
    }
    
    function clearScores() {
        homeScore = 0;
        guestScore = 0;
        document.getElementById('homeScore').textContent = homeScore;
        document.getElementById('guestScore').textContent = guestScore;
    
    alert('Score cleared');
    }
</script>

<p>A link styled as a button:</p>
<a href="homepage.html" target="_blank">Homepage link</a>
</body>
</html>
